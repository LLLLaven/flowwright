                  - text: "][StateGraph.compile] method."
                - paragraph [ref=e398]: :::python
                - generic [ref=e399]:
                  - generic [ref=e400]: "# Build workflow agent_builder = StateGraph(MessagesState) # Add nodes agent_builder.add_node(\"llm_call\", llm_call) agent_builder.add_node(\"tool_node\", tool_node) # Add edges to connect nodes agent_builder.add_edge(START, \"llm_call\") agent_builder.add_conditional_edges( \"llm_call\", should_continue, [\"tool_node\", END] ) agent_builder.add_edge(\"tool_node\", \"llm_call\") # Compile the agent agent = agent_builder.compile() # Show the agent from IPython.display import Image, display display(Image(agent.get_graph(xray=True).draw_mermaid_png())) # Invoke from langchain.messages import HumanMessage messages = [HumanMessage(content=\"Add 3 and 4.\")] messages = agent.invoke({\"messages\": messages}) for m in messages[\"messages\"]: m.pretty_print()"
