                - paragraph [ref=e229]: This quickstart demonstrates how to build a calculator agent using the LangGraph Graph API or the Functional API.
                - text: "**Using an AI coding assistant?**"
                - generic [ref=e230]:
                  - code [ref=e232]: "- Install the [LangChain Docs MCP server](/use-these-docs) to give your agent access to up-to-date LangChain documentation and examples. - Install [LangChain Skills](https://github.com/langchain-ai/langchain-skills) to improve your agent's performance on LangChain ecosystem tasks."
                  - button "Copy code to clipboard" [ref=e234] [cursor=pointer]:
