                  - listitem [ref=e239]:
                    - link "Use the Graph API" [ref=e240] [cursor=pointer]:
                      - /url: "#use-the-graph-api"
                    - text: if you prefer to define your agent as a graph of nodes and edges.
                  - listitem [ref=e241]:
                    - link "Use the Functional API" [ref=e242] [cursor=pointer]:
                      - /url: "#use-the-functional-api"
                    - text: if you prefer to define your agent as a single function.
                - paragraph [ref=e243]:
                  - text: For conceptual information, see
                  - link "Graph API overview" [ref=e244] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/langgraph/graph-api
                  - text: and
                  - link "Functional API overview" [ref=e245] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/langgraph/functional-api
                  - text: .
                - text: For this example, you will need to set up a [Claude (Anthropic)](
                - link "https://www.anthropic.com/" [ref=e246] [cursor=pointer]:
                  - /url: https://www.anthropic.com/
                - text: ") account and get an API key. Then, set the `ANTHROPIC_API_KEY` environment variable in your terminal."
                - generic [ref=e247]:
                  - heading "1. Define tools and model" [level=2] [ref=e248]
                  - 'link "Permalink: 1. Define tools and model" [ref=e249] [cursor=pointer]':
                    - /url: "#1-define-tools-and-model"
                    - img [ref=e250]
                - paragraph [ref=e252]: In this example, we'll use the Claude Sonnet 4.5 model and define tools for addition, multiplication, and division.
                - paragraph [ref=e253]: :::python
                - generic [ref=e254]:
                  - generic [ref=e255]:
                    - text: "from langchain.tools import tool from langchain.chat_models import init_chat_model model = init_chat_model( \"claude-sonnet-4-6\", temperature=0 ) # Define tools"
                    - generic [ref=e256]: "@tool"
                    - text: "def multiply(a: int, b: int) -> int: \"\"\"Multiply `a` and `b`."
                    - text: "Args: a: First int b: Second int \"\"\" return a * b"
                    - generic [ref=e257]: "@tool"
                    - text: "def add(a: int, b: int) -> int: \"\"\"Adds `a` and `b`."
                    - text: "Args: a: First int b: Second int \"\"\" return a + b"
                    - generic [ref=e258]: "@tool"
                    - text: "def divide(a: int, b: int) -> float: \"\"\"Divide `a` and `b`."
                    - text: "Args: a: First int b: Second int \"\"\" return a / b # Augment the LLM with tools tools = [add, multiply, divide] tools_by_name = {tool.name: tool for tool in tools} model_with_tools = model.bind_tools(tools)"
                  - button "Copy code to clipboard" [ref=e260] [cursor=pointer]:
                    - img [ref=e261]
                - paragraph [ref=e264]: ":::"
                - paragraph [ref=e265]: :::js
                - generic [ref=e266]:
                  - generic [ref=e267]: "import { ChatAnthropic } from \"@langchain/anthropic\"; import { tool } from \"@langchain/core/tools\"; import * as z from \"zod\"; const model = new ChatAnthropic({ model: \"claude-sonnet-4-6\", temperature: 0, }); // Define tools const add = tool(({ a, b }) => a + b, { name: \"add\", description: \"Add two numbers\", schema: z.object({ a: z.number().describe(\"First number\"), b: z.number().describe(\"Second number\"), }), }); const multiply = tool(({ a, b }) => a * b, { name: \"multiply\", description: \"Multiply two numbers\", schema: z.object({ a: z.number().describe(\"First number\"), b: z.number().describe(\"Second number\"), }), }); const divide = tool(({ a, b }) => a / b, { name: \"divide\", description: \"Divide two numbers\", schema: z.object({ a: z.number().describe(\"First number\"), b: z.number().describe(\"Second number\"), }), }); // Augment the LLM with tools const toolsByName = { [add.name]: add, [multiply.name]: multiply, [divide.name]: divide, }; const tools = Object.values(toolsByName); const modelWithTools = model.bindTools(tools);"
                  - button "Copy code to clipboard" [ref=e269] [cursor=pointer]:
                    - img [ref=e270]
                - paragraph [ref=e273]: ":::"
                - generic [ref=e274]:
                  - heading "2. Define state" [level=2] [ref=e275]
                  - 'link "Permalink: 2. Define state" [ref=e276] [cursor=pointer]':
                    - /url: "#2-define-state"
                    - img [ref=e277]
                - paragraph [ref=e279]: The graph's state is used to store the messages and the number of LLM calls.
                - paragraph [ref=e280]: :::python
                - text: State in LangGraph persists throughout the agent's execution.
                - generic [ref=e281]:
                  - code [ref=e283]: "The `Annotated` type with `operator.add` ensures that new messages are appended to the existing list rather than replacing it."
                  - button "Copy code to clipboard" [ref=e285] [cursor=pointer]:
                    - img [ref=e286]
                - paragraph [ref=e289]: ":::"
                - paragraph [ref=e290]: :::js
                - text: State in LangGraph persists throughout the agent's execution.
                - generic [ref=e291]:
                  - code [ref=e293]: "The `MessagesValue` provides a built-in reducer for appending messages. The `llmCalls` field uses a `ReducedValue` with `(x, y) => x + y` to accumulate the count."
                  - button "Copy code to clipboard" [ref=e295] [cursor=pointer]:
                    - img [ref=e296]
                - paragraph [ref=e299]: ":::"
                - paragraph [ref=e300]: :::python
                - generic [ref=e301]:
                  - generic [ref=e302]: "from langchain.messages import AnyMessage from typing_extensions import TypedDict, Annotated import operator class MessagesState(TypedDict): messages: Annotated[list[AnyMessage], operator.add] llm_calls: int"
                  - button "Copy code to clipboard" [ref=e304] [cursor=pointer]:
                    - img [ref=e305]
                - paragraph [ref=e308]: ":::"
                - paragraph [ref=e309]: :::js
                - generic [ref=e310]:
                  - generic [ref=e311]: "import { StateGraph, StateSchema, MessagesValue, ReducedValue, GraphNode, ConditionalEdgeRouter, START, END, } from \"@langchain/langgraph\"; import { z } from \"zod/v4\"; const MessagesState = new StateSchema({ messages: MessagesValue, llmCalls: new ReducedValue( z.number().default(0), { reducer: (x, y) => x + y } ), });"
                  - button "Copy code to clipboard" [ref=e313] [cursor=pointer]:
                    - img [ref=e314]
                - paragraph [ref=e317]: ":::"
                - generic [ref=e318]:
                  - heading "3. Define model node" [level=2] [ref=e319]
                  - 'link "Permalink: 3. Define model node" [ref=e320] [cursor=pointer]':
                    - /url: "#3-define-model-node"
                    - img [ref=e321]
                - paragraph [ref=e323]: The model node is used to call the LLM and decide whether to call a tool or not.
                - paragraph [ref=e324]: :::python
                - generic [ref=e325]:
                  - generic [ref=e326]: "from langchain.messages import SystemMessage def llm_call(state: dict): \"\"\"LLM decides whether to call a tool or not\"\"\" return { \"messages\": [ model_with_tools.invoke( [ SystemMessage( content=\"You are a helpful assistant tasked with performing arithmetic on a set of inputs.\" ) ] + state[\"messages\"] ) ], \"llm_calls\": state.get('llm_calls', 0) + 1 }"
                  - button "Copy code to clipboard" [ref=e328] [cursor=pointer]:
                    - img [ref=e329]
                - paragraph [ref=e332]: ":::"
                - paragraph [ref=e333]: :::js
                - generic [ref=e334]:
                  - generic [ref=e335]: "import { SystemMessage } from \"@langchain/core/messages\"; const llmCall: GraphNode<typeof MessagesState> = async (state) => { const response = await modelWithTools.invoke([ new SystemMessage( \"You are a helpful assistant tasked with performing arithmetic on a set of inputs.\" ), ...state.messages, ]); return { messages: [response], llmCalls: 1, }; };"
                  - button "Copy code to clipboard" [ref=e337] [cursor=pointer]:
                    - img [ref=e338]
                - paragraph [ref=e341]: ":::"
                - generic [ref=e342]:
                  - heading "4. Define tool node" [level=2] [ref=e343]
                  - 'link "Permalink: 4. Define tool node" [ref=e344] [cursor=pointer]':
                    - /url: "#4-define-tool-node"
                    - img [ref=e345]
                - paragraph [ref=e347]: The tool node is used to call the tools and return the results.
                - paragraph [ref=e348]: :::python
                - generic [ref=e349]:
                  - generic [ref=e350]: "from langchain.messages import ToolMessage def tool_node(state: dict): \"\"\"Performs the tool call\"\"\" result = [] for tool_call in state[\"messages\"][-1].tool_calls: tool = tools_by_name[tool_call[\"name\"]] observation = tool.invoke(tool_call[\"args\"]) result.append(ToolMessage(content=observation, tool_call_id=tool_call[\"id\"])) return {\"messages\": result}"
                  - button "Copy code to clipboard" [ref=e352] [cursor=pointer]:
                    - img [ref=e353]
                - paragraph [ref=e356]: ":::"
                - paragraph [ref=e357]: :::js
                - generic [ref=e358]:
                  - generic [ref=e359]: "import { AIMessage, ToolMessage } from \"@langchain/core/messages\"; const toolNode: GraphNode<typeof MessagesState> = async (state) => { const lastMessage = state.messages.at(-1); if (lastMessage == null || !AIMessage.isInstance(lastMessage)) { return { messages: [] }; } const result: ToolMessage[] = []; for (const toolCall of lastMessage.tool_calls ?? []) { const tool = toolsByName[toolCall.name]; const observation = await tool.invoke(toolCall); result.push(observation); } return { messages: result }; };"
                  - button "Copy code to clipboard" [ref=e361] [cursor=pointer]:
                    - img [ref=e362]
                - paragraph [ref=e365]: ":::"
                - generic [ref=e366]:
                  - heading "5. Define end logic" [level=2] [ref=e367]
                  - 'link "Permalink: 5. Define end logic" [ref=e368] [cursor=pointer]':
                    - /url: "#5-define-end-logic"
                    - img [ref=e369]
                - paragraph [ref=e371]: The conditional edge function is used to route to the tool node or end based upon whether the LLM made a tool call.
                - paragraph [ref=e372]: :::python
                - generic [ref=e373]:
                  - generic [ref=e374]: "from typing import Literal from langgraph.graph import StateGraph, START, END def should_continue(state: MessagesState) -> Literal[\"tool_node\", END]: \"\"\"Decide if we should continue the loop or stop based upon whether the LLM made a tool call\"\"\" messages = state[\"messages\"] last_message = messages[-1] # If the LLM makes a tool call, then perform an action if last_message.tool_calls: return \"tool_node\" # Otherwise, we stop (reply to the user) return END"
                  - button "Copy code to clipboard" [ref=e376] [cursor=pointer]:
                    - img [ref=e377]
                - paragraph [ref=e380]: ":::"
                - paragraph [ref=e381]: :::js
                - generic [ref=e382]:
                  - generic [ref=e383]: "const shouldContinue: ConditionalEdgeRouter<typeof MessagesState, \"toolNode\"> = (state) => { const lastMessage = state.messages.at(-1); // Check if it's an AIMessage before accessing tool_calls if (!lastMessage || !AIMessage.isInstance(lastMessage)) { return END; } // If the LLM makes a tool call, then perform an action if (lastMessage.tool_calls?.length) { return \"toolNode\"; } // Otherwise, we stop (reply to the user) return END; };"
                  - button "Copy code to clipboard" [ref=e385] [cursor=pointer]:
                    - img [ref=e386]
                - paragraph [ref=e389]: ":::"
                - generic [ref=e390]:
                  - heading "6. Build and compile the agent" [level=2] [ref=e391]
                  - 'link "Permalink: 6. Build and compile the agent" [ref=e392] [cursor=pointer]':
                    - /url: "#6-build-and-compile-the-agent"
                    - img [ref=e393]
                - paragraph [ref=e395]:
                  - text: The agent is built using the @[
                  - code [ref=e396]: StateGraph
                  - text: "] class and compiled using the @["
