                      - cell "Gain control with LangGraph to design agents that reliably handle complex tasks" [ref=e234]
                - paragraph [ref=e235]: Trusted by companies shaping the future of agents-- including Klarna, Uber, J.P. Morgan, and more-- LangGraph is a low-level orchestration framework and runtime for building, managing, and deploying long-running, stateful agents.
                - paragraph [ref=e236]:
                  - text: LangGraph is very low-level, and focused entirely on agent
                  - strong [ref=e237]: orchestration
                  - text: . Before using LangGraph, we recommend you familiarize yourself with some of the components used to build agents, starting with
                  - link "models" [ref=e238] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/langchain/models
                  - text: and
                  - link "tools" [ref=e239] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/langchain/tools
                  - text: .
                - paragraph [ref=e240]:
                  - text: We will commonly use
                  - link "LangChain" [ref=e241] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/langchain/overview
                  - text: components throughout the documentation to integrate models and tools, but you don't need to use LangChain to use LangGraph. If you are just getting started with agents or want a higher-level abstraction, we recommend you use LangChain's
                  - link "agents" [ref=e242] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/langchain/agents
                  - text: that provide prebuilt architectures for common LLM and tool-calling loops.
                - paragraph [ref=e243]: "LangGraph is focused on the underlying capabilities important for agent orchestration: durable execution, streaming, human-in-the-loop, and more."
                - list [ref=e244]:
                  - listitem [ref=e245]:
                    - link "Deep Agents" [ref=e246] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/deepagents/overview
                    - text: is an
                    - link "agent harness" [ref=e247] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/concepts/products#agent-harnesses-like-the-deep-agents-sdk
                    - text: ": planning, subagents, filesystem tools, and context management on top of LangGraph."
                  - listitem [ref=e248]:
                    - link "LangChain" [ref=e249] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/langchain/overview
                    - text: "is the agent framework: abstractions and integrations for models, tools, and agent loops."
                  - listitem [ref=e250]:
                    - link "LangGraph" [ref=e251] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/langgraph/overview
                    - text: "is the orchestration runtime: durable execution, streaming, human-in-the-loop, and persistence."
                  - listitem [ref=e252]:
                    - link "LangSmith" [ref=e253] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/langsmith/observability
                    - text: is the platform for tracing, evaluation, prompts, and deployment across frameworks.
                  - listitem [ref=e254]:
                    - link "LangSmith Engine" [ref=e255] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/langsmith/engine
                    - text: detects issues in your LangGraph agent traces and proposes fixes. You can open a pull request with the proposed fix directly from the Engine tab.
                  - listitem [ref=e256]:
                    - link "LangSmith Fleet" [ref=e257] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/langsmith/fleet/index
                    - text: is the no-code agent builder for templates, integrations, and routine automation.
                - paragraph [ref=e258]:
                  - text: Read
                  - link "Frameworks, runtimes, and harnesses" [ref=e259] [cursor=pointer]:
                    - /url: /langchain-ai/docs/blob/main/oss/concepts/products
                  - text: for a comparison of the open source stack.
