                - text: ":::"
                - paragraph [ref=e309]: "Then, create a simple hello world example:"
                - paragraph [ref=e310]: :::python
                - generic [ref=e311]:
                  - generic [ref=e312]: "from langgraph.graph import StateGraph, MessagesState, START, END def mock_llm(state: MessagesState): return {\"messages\": [{\"role\": \"ai\", \"content\": \"hello world\"}]} graph = StateGraph(MessagesState) graph.add_node(mock_llm) graph.add_edge(START, \"mock_llm\") graph.add_edge(\"mock_llm\", END) graph = graph.compile() graph.invoke({\"messages\": [{\"role\": \"user\", \"content\": \"hi!\"}]})"
                  - button "Copy code to clipboard" [ref=e314] [cursor=pointer]:
                    - img [ref=e315]
                - paragraph [ref=e318]: ":::"
                - paragraph [ref=e319]: :::js
                - generic [ref=e320]:
                  - generic [ref=e321]: "import { StateSchema, MessagesValue, type GraphNode, StateGraph, START, END } from \"@langchain/langgraph\"; const State = new StateSchema({ messages: MessagesValue, }); const mockLlm: GraphNode<typeof State> = (state) => { return { messages: [{ role: \"ai\", content: \"hello world\" }] }; }; const graph = new StateGraph(State) .addNode(\"mock_llm\", mockLlm) .addEdge(START, \"mock_llm\") .addEdge(\"mock_llm\", END) .compile(); await graph.invoke({ messages: [{ role: \"user\", content: \"hi!\" }] });"
                  - button "Copy code to clipboard" [ref=e323] [cursor=pointer]:
                    - img [ref=e324]
                - paragraph [ref=e327]: ":::"
                - text: "Use [LangSmith](/langsmith/observability) to trace requests, debug agent behavior, and evaluate outputs. Set `LANGSMITH_TRACING=true` and your API key to get started. Follow the [tracing quickstart](/langsmith/trace-with-langchain) to get set up. We recommend you also set up [LangSmith Engine](/langsmith/engine) which monitors your traces, detects issues, and proposes fixes."
                - generic [ref=e328]:
                  - heading "Core benefits" [level=2] [ref=e329]
                  - 'link "Permalink: Core benefits" [ref=e330] [cursor=pointer]':
                    - /url: "#core-benefits"
                    - img [ref=e331]
                - paragraph [ref=e333]:
                  - text: LangGraph provides low-level supporting infrastructure for
                  - emphasis [ref=e334]: any
                  - text: "long-running, stateful workflow or agent. LangGraph does not abstract prompts or architecture, and provides the following central benefits:"
                - list [ref=e335]:
                  - listitem [ref=e336]:
                    - link "Persistence" [ref=e337] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/langgraph/persistence
                    - text: ": Build agents that persist through failures and can run for extended periods, resuming from where they left off."
                  - listitem [ref=e338]:
                    - link "Human-in-the-loop" [ref=e339] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/langgraph/interrupts
                    - text: ": Incorporate human oversight by inspecting and modifying agent state at any point."
                  - listitem [ref=e340]:
                    - link "Comprehensive memory" [ref=e341] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/oss/concepts/memory
                    - text: ": Create stateful agents with both short-term working memory for ongoing reasoning and long-term memory across sessions."
                  - listitem [ref=e342]:
                    - link "Debugging with LangSmith" [ref=e343] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/langsmith/observability
                    - text: ": Gain deep visibility into complex agent behavior with visualization tools that trace execution paths, capture state transitions, and provide detailed runtime metrics."
                  - listitem [ref=e344]:
                    - link "Production-ready deployment" [ref=e345] [cursor=pointer]:
                      - /url: /langchain-ai/docs/blob/main/langsmith/deployment
                    - text: ": Deploy sophisticated agent systems confidently with scalable infrastructure designed to handle the unique challenges of stateful, long-running workflows."
                - generic [ref=e346]:
                  - heading "LangGraph ecosystem" [level=2] [ref=e347]
                  - 'link "Permalink: LangGraph ecosystem" [ref=e348] [cursor=pointer]':
                    - /url: "#langgraph-ecosystem"
                    - img [ref=e349]
                - paragraph [ref=e351]: "While LangGraph can be used standalone, it also integrates seamlessly with any LangChain product, giving developers a full suite of tools for building agents. To improve your LLM application development, pair LangGraph with:"
                - text: Trace requests, evaluate outputs, and monitor deployments in one place. Prototype locally with LangGraph, then move to production with integrated observability and evaluation to build more reliable agent systems.
                - generic [ref=e352]:
                  - code [ref=e354]: <Card title="LangSmith Deployment" icon="/images/brand/deployment-icon-dark.png" href="/langsmith/deployment" arrow cta="Learn more"> Deploy and scale agents effortlessly with a purpose-built deployment platform for long running, stateful workflows. Discover, reuse, configure, and share agents across teams — and iterate quickly with visual prototyping in Studio. </Card> <Card title="LangChain" icon="/images/brand/langchain-icon.png" href="/oss/langchain/overview" arrow cta="Learn more"> Provides integrations and composable components to streamline LLM application development. Contains agent abstractions built on top of LangGraph. </Card>
